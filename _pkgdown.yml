url: https://data-wise.github.io/probmed

template:
  bootstrap: 5
  bootswatch: litera
  bslib:
    # Consistent academic blue across ecosystem
    primary: "#0054AD"
    bg: "#ffffff"
    fg: "#212529"
    # Modern, readable fonts (consistent with mediationverse)
    base_font: { google: "Inter" }
    heading_font: { google: "Montserrat" }
    code_font: { google: "Fira Code" }
    font-size-base: 0.925rem

home:
  title: "probmed: Probabilistic Effect Sizes for Mediation"
  description: >
    Compute P_med, a scale-free probabilistic effect size for
    causal mediation analysis. Modern S7-based architecture with
    bootstrap inference, GLM support, and seamless integration
    with lavaan and mediation packages.

  sidebar:
    structure: [links, license, citation, authors, dev]

  links:
  - text: "Source Code"
    href: https://github.com/data-wise/probmed
  - text: "Report Issues"
    href: https://github.com/data-wise/probmed/issues
  - text: "Request Feature"
    href: https://github.com/data-wise/probmed/issues/new

logo:
  image: man/figures/logo.png
  align: right
  width: 350px

navbar:
  structure:
    left:  [home, reference, articles, ecosystem, status, news]
    right: [search, github]
  components:
    home:
      icon: fas fa-home fa-lg
      href: index.html
      aria-label: Home
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Vignettes
      menu:
      - text: "Introduction to probmed"
        href: articles/introduction.html
      - text: "─────────────"
      - text: "Methods"
      - text: "Parallel Mediation: joint P_med"
        href: articles/parallel-mediation.html
      - text: "Gauge residual: when P_med is unreliable"
        href: articles/gauge-residual.html
      - text: "─────────────"
      - text: "Integration Guides"
      - text: "lavaan Integration"
        href: articles/lavaan-integration.html
      - text: "mediation Package Integration"
        href: articles/mediation-integration.html
      - text: "Package Comparison"
        href: articles/package-comparison.html
    ecosystem:
      text: Ecosystem
      href: https://data-wise.github.io/mediationverse/articles/ecosystem.html
    status:
      icon: fas fa-chart-line
      text: Status
      menu:
      - text: "📊 Package Status Dashboard"
        href: https://github.com/data-wise/mediationverse/blob/main/STATUS.md
      - text: "🗺️ Development Roadmap"
        href: https://data-wise.github.io/mediationverse/articles/roadmap.html
      - text: "🤝 Contributing Guide"
        href: https://data-wise.github.io/mediationverse/articles/contributing.html
      - text: "---------"
      - text: "📋 Ecosystem Coordination"
        href: https://github.com/data-wise/medfit/blob/main/planning/ECOSYSTEM.md
    news:
      text: News
      href: news/index.html
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/data-wise/probmed
      aria-label: GitHub

reference:
  - title: "Core Functions"
    desc: >
      Primary functions for computing P_med and extracting mediation
      structures from fitted statistical models.
    contents:
      - pmed
      - pmed-formula
      - pmed-MediationData
      - extract_mediation

  - title: "S7 Class Definitions"
    desc: >
      Formal class structures for mediation analysis objects.
      These classes define the object-oriented architecture of the package.
    contents:
      - PmedResult

  - title: "Methods and Utilities"
    desc: >
      Generic methods for working with probmed objects, including
      print, summary, and visualization functions.
    contents:
      - has_keyword("methods")
      - starts_with("print")
      - starts_with("summary")
      - starts_with("plot")

  - title: "Internal Functions"
    desc: >
      Low-level computational functions. These functions are exported
      for transparency but are not intended for direct use by end users.
    contents:
      - starts_with(".")
      - has_keyword("internal")

articles:
  - title: "Getting Started"
    navbar: ~
    contents:
      - introduction
  - title: "Methods"
    navbar: ~
    contents:
      - parallel-mediation
      - gauge-residual
      - incremental-pmed
  - title: "Integration Guides"
    navbar: ~
    contents:
      - lavaan-integration
      - mediation-integration
      - package-comparison

development:
  mode: auto
  version_label: default
  version_tooltip: "Development version"

authors:
  Davood Tofighi:
    href: "https://orcid.org/0000-0001-8523-7776"
    html: "<img src='https://orcid.org/sites/default/files/images/orcid_16x16.png' height='16' width='16' alt='ORCID iD icon'> Davood Tofighi"

footer:
  structure:
    left: [developed_by, built_with]
    right: [package_version]
  components:
    package_version: "Version {version}"
    developed_by: |
      Developed by [Davood Tofighi](https://orcid.org/0000-0001-8523-7776)
    built_with: |
      Built with [pkgdown](https://pkgdown.r-lib.org/)
